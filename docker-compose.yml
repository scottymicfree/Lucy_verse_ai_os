    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      policy_engine:
        condition: service_healthy
      vault_api:
        condition: service_healthy
      executor_api:
        condition: service_healthy
      memory_engine:
