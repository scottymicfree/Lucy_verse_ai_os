    ports:
      - "8305:8305"
    environment:
      - PORT=8305
    networks:
      - lucy_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8305/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
