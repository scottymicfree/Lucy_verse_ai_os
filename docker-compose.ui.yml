version: '3.8'
services:
  toolbelt:
	build:
	  context: ./src/toolbelt
	  dockerfile: Dockerfile
	ports:
	  - "8001:8001"
	volumes:
	  - ./src/logs:/app/../logs
  frontend:
	build:
	  context: ./src/frontend
	  dockerfile: Dockerfile.prod
	ports:
	  - "3000:3000"
	depends_on:
	  - toolbelt

  electron:
	build:
	  context: ./src/electron_app
	  dockerfile: Dockerfile
	ports:
	  - "3001:3000"
	depends_on:
	  - frontend
